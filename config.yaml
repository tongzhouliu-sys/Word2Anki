# Word2Anki Configuration File

# The name of the Anki Deck to import cards into
deck_name: "Word2Anki"

# The OpenAI-compatible API model to use for generating card content (e.g. gpt-4o-mini, deepseek-chat)
api_model: "qwen3.7-plus"

# The base URL for the OpenAI-compatible API (e.g. https://api.openai.com/v1 or https://api.deepseek.com/v1)
api_base_url: "https://coding.dashscope.aliyuncs.com/v1"

# The Edge TTS voice to use for pronunciation audio
# Refer to edge-tts --list-voices for available options
voice: "en-US-AvaNeural"

# The SQLite database file path to keep track of job status
db_path: "word2anki.db"

# The batch size of words to send in a single API request (5-10 is recommended to avoid timeouts)
batch_size: 10

# The timeout in seconds for API requests
api_timeout: 120

